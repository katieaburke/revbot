<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pipeline Nudge</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 300px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        color: #111827;
        background: #fff;
      }
      .header {
        padding: 14px 16px 12px;
        border-bottom: 1px solid #f3f4f6;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .header h1 { font-size: 14px; font-weight: 600; }
      .header p { font-size: 11px; color: #6b7280; margin-top: 1px; }
      .body { padding: 14px 16px; }
      .field { margin-bottom: 12px; }
      .field label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: .4px;
      }
      .field input {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 12px;
        outline: none;
        transition: border .15s;
      }
      .field input:focus { border-color: #4f5df7; }
      .field .hint { font-size: 11px; color: #9ca3af; margin-top: 3px; }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .toggle-row label { font-size: 12px; color: #374151; }
      input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
      .btn {
        width: 100%;
        background: #4f5df7;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 9px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 4px;
      }
      .btn:hover { background: #3d4de6; }
      .status {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
        display: none;
      }
      .status.success { background: #f0fdf4; color: #166534; display: block; }
      .status.error { background: #fef2f2; color: #991b1b; display: block; }
      .divider { border: none; border-top: 1px solid #f3f4f6; margin: 12px 0; }
      .connection-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 20px;
      }
      .connection-badge.connected { background: #f0fdf4; color: #166534; }
      .connection-badge.disconnected { background: #fef2f2; color: #991b1b; }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1>Pipeline Nudge</h1>
        <p>Deal health for Salesforce</p>
      </div>
    </div>
    <div class="body">
      <div id="connection-status" style="margin-bottom:12px;"></div>

      <div class="field">
        <label>API URL</label>
        <input type="url" id="apiUrl" placeholder="https://pipeline-nudge.yourcompany.com" />
        <div class="hint">Your Pipeline Nudge backend URL</div>
      </div>

      <div class="field">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="From admin settings → API Keys" />
      </div>

      <div class="field">
        <label>Your work email</label>
        <input type="email" id="slackEmail" placeholder="you@company.com" />
        <div class="hint">Used to identify you when nudging deal owners</div>
      </div>

      <hr class="divider" />

      <div class="toggle-row">
        <label for="isRevOps">I'm on the RevOps team</label>
        <input type="checkbox" id="isRevOps" />
      </div>
      <div class="hint" style="margin-bottom:12px;margin-top:-8px;">
        Enables the "Nudge owner" button on deal pages
      </div>

      <button class="btn" id="save">Save settings</button>
      <div class="status" id="status"></div>
    </div>
    <script type="module" src="popup.ts"></script>
  </body>
</html>
